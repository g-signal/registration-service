version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: signal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - signal-network
    command: redis-server --appendonly yes

  registration-service:
    image: gaolixin622/signal_registrationservice:2.45.1-dirty-SNAPSHOT-staging
    container_name: signal-registration-service
    ports:
      - "8280:8080"
      - "8281:8081"
      - "8283:8083"
    environment:
      - JAVA_OPTS=-Xmx8192m -Xss512k -XX:+HeapDumpOnOutOfMemoryError
      - GOOGLE_APPLICATION_CREDENTIALS=/etc/gcp/google-account-key.json
      - MICRONAUT_CONFIG_FILES=file:/usr/share/signal/staging.yml
      - MICRONAUT_ENVIRONMENTS=gcp
      - REDIS_URI=redis://redis:6379
      - MICRONAUT_REDIS_URI=redis://redis:6379
      - MICRONAUT_REDIS_PASSWORD=""
    volumes:
      - /Users/amber/Desktop/bison/signal/signal-docker/config/signal_registrationservice:/usr/share/signal
      - /Users/amber/Desktop/bison/signal/signal-docker/gcp:/etc/gcp
      - /Users/amber/Desktop/bison/signal/signal-docker/log:/log
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - signal-network

networks:
  signal-network:
    driver: bridge

volumes:
  redis-data:
  registration-data:
