micronaut:
  env: gcp
  application:
    name: registrationService
  server:
    port: 8001
  metrics:
    binders:
      netty:
        queues:
          enabled: true

    export:
      datadog:
        enabled: true
        step: 20s

      otlp:
        enabled: true
        step: 20s

    tags:
      # Note that an `instance` tag is added at runtime in `Application.java`
      service: registration

  executors:
    scheduled:
      type: scheduled
      core-pool-size: 16

gcp: # env = gcp or env = cli, BigtableDataClientFactory
  project-id:
  bigtable:
    instance-id:

session-repository: # must
  bigtable: # BigtableSessionRepositoryConfiguration
    table-name:
    column-family-name:
    remove-expired-sessions-interval: 10s #/string, timer,Scheduled

stats:
  bigquery: #VerificationStatsConfiguration
    window-size: P1D # Duration, default P1D
    table-name: # String


cost:
  bigquery: #BigQueryCostProviderConfiguration
    completed-attempts-table-name: # String
    analyzed-attempts-table-name: # String
    window-size: P1D # Duration,default P1D


twilio: #短信渠道 #TwilioConfiguration
  account-sid:
  api-key-sid:
  api-key-secret:
  min-retry-wait: 100ms # Duration, default 100ms
  max-retries: 5 # int, default 5
  messaging: #TwilioMessagingConfiguration
    nanpa-messaging-service-sid: # String
    global-messaging-service-sid: # String
    session-ttl: PT10M # Duration, default PT10M
  voice: #TwilioVoiceConfiguration
    phone-numbers: # list<string>
      - 121
      - 233
    cdn-uri: # URI， 语音文件的存储地址
    supported-languages: #list<String>,有默认值
  verify: # TwilioVerifyConfiguration
    service-sid: # String
    service-friendly-name: # String
    android-app-hash: # String
    custom-template-sid: # String
    custom-template-supported-languages:  #list<String>, 默认空
    supported-languages:  #list<String>,有默认值


rate-limits:
  leaky-bucket:
    limiter1:
      maxCapacity: 5
      permitRegenerationPeriod: 288m
      minDelay: 1m
    limiter2:
      maxCapacity: 10
      permitRegenerationPeriod: 144m
      minDelay: 30s

selection:  # DynamicSenderSelectionStrategy
  sms:
    fallback-senders:
      - twilio-verify
    default-weights:
      adaptive: 100
  voice:
    fallback-senders:
      - twilio-verify
    default-weights:
      adaptive: 100


adaptive: #AdaptiveStrategyConfiguration
  sms:
    default-choices:
      - twilio-verify
  voice:
    default-choices:
      - twilio-verify

verification:
  sms: #VerificationSmsConfiguration
    android-app-hash: # String

redis: # StatefulRedisConnection must
  uri: redis://localhost:6379
  password: your_redis_password # 如果没有密码，可以省略此行



# env = gcp
# env = analytics
# env = cli




